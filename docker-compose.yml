services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: bulkapply-app
    container_name: bulkapply-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bulkapply

  nginx:
    image: nginx:1.27-alpine
    container_name: bulkapply-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - bulkapply

  mysql:
    image: mysql:8.0
    container_name: bulkapply-mysql
    restart: unless-
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bulkapply}
      MYSQL_USER: ${DB_USERNAME:-bulkapply}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bulkapply

  queue:
    image: bulkapply-app
    container_name: bulkapply-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - mysql
    networks:
      - bulkapply

  mailpit:
    image: axllent/mailpit:latest
    container_name: bulkapply-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - bulkapply

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bulkapply-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql
    networks:
      - bulkapply

networks:
  bulkapply:
    driver: bridge

volumes:
  mysql-data:
